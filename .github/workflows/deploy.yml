name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            # 创建部署目录
            sudo mkdir -p ${{ secrets.DEPLOY_PATH }}
            sudo chown ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} ${{ secrets.DEPLOY_PATH }}

            # 备份当前版本（如果存在）
            if [ -d "${{ secrets.DEPLOY_PATH }}/dist" ]; then
              cp -r ${{ secrets.DEPLOY_PATH }}/dist ${{ secrets.DEPLOY_PATH }}/dist.backup
            fi
          ENDSSH

      - name: Upload build artifacts
        uses: burnett01/rsync-deployments@5.2.0
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: ${{ secrets.DEPLOY_PATH }}/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure Nginx
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            # 复制 Nginx 配置
            sudo tee /etc/nginx/sites-available/${{ secrets.SITE_NAME }} > /dev/null <<'EOF'
            server {
              listen 80;
              server_name ${{ secrets.SERVER_DOMAIN }};

              root ${{ secrets.DEPLOY_PATH }}/dist;
              index index.html;

              # Gzip 压力
              gzip on;
              gzip_vary on;
              gzip_min_length 1024;
              gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/json;

              # 静态资源缓存
              location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
              }

              # React Router 支持
              location / {
                try_files $uri $uri/ /index.html;
              }

              # API 代理（可选）
              location /api/ {
                proxy_pass ${{ secrets.API_PROXY_URL }};
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
              }
            }
            EOF

            # 启用站点
            sudo ln -f -s /etc/nginx/sites-available/${{ secrets.SITE_NAME }} /etc/nginx/sites-enabled/

            # 测试并重载 Nginx
            sudo nginx -t && sudo systemctl reload nginx
          ENDSSH

      - name: Clean SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
